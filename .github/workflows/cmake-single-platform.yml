name: CMake Build and Archive

on:
  workflow_dispatch:
  

env:
  # 自定义CMake构建类型
  BUILD_TYPE: Release

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Configure CMake
      run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}

    - name: Build
      run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}}

    - name: Locate Build Artifact
      # 显示构建产物信息，便于确认路径
      run: |
        echo "查找构建产物..."
        find ${{github.workspace}}/build -name "atrust_SWPU" -type f -executable -print

    - name: Archive Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: atrust_SWPU-macos
        # 指定构建产物路径，根据实际情况调整
        path: ${{github.workspace}}/build/${{env.BUILD_TYPE}}/atrust_SWPU
        # 可选：设置保留时间（天）
        retention-days: 30
    
